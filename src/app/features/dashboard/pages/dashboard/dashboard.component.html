<section class="dashboard-shell">
  <aside class="sidebar">
    <h1 class="brand">sirva</h1>
    <nav aria-label="Main dashboard navigation">
      <a class="nav-item active">Dashboard</a>
      <a class="nav-item">Vendor Marketplace</a>
      <a class="nav-item">Widget Library</a>
      <a class="nav-item">Publishing Workflow</a>
      <a class="nav-item">Landing Pages</a>
      <a class="nav-item">Rules Engine</a>
      <a class="nav-item">Analytics</a>
      <a class="nav-item">Governance</a>
    </nav>
  </aside>

  <section class="dashboard-page">
    <header class="dashboard-header">
      <div>
        <h2>Platform Dashboard</h2>
        <p>Enterprise content governance and performance overview</p>
      </div>
      <button class="refresh-btn" type="button" (click)="onManualRefresh()">
        Refresh
      </button>
    </header>

    <section class="kpi-grid">
      <app-kpi-card
        title="Total Vendors"
        [value]="metrics?.totalVendorsOnboarded ?? null"
        [loading]="viewState.kpiState === 'loading'"
        [errorMessage]="sectionError('kpi')"
        [updatedAt]="viewState.lastUpdatedAt"
      ></app-kpi-card>
      <app-kpi-card
        title="Active Widgets"
        [value]="metrics?.activeWidgets ?? null"
        [loading]="viewState.kpiState === 'loading'"
        [errorMessage]="sectionError('kpi')"
        [updatedAt]="viewState.lastUpdatedAt"
      ></app-kpi-card>
      <app-kpi-card
        title="Pending Approvals"
        [value]="metrics?.pendingWidgetApprovals ?? null"
        [loading]="viewState.kpiState === 'loading'"
        [errorMessage]="sectionError('kpi')"
        [updatedAt]="viewState.lastUpdatedAt"
      ></app-kpi-card>
      <app-kpi-card
        title="Leads Captured"
        [value]="metrics?.leadsCaptured ?? null"
        [loading]="viewState.kpiState === 'loading'"
        [errorMessage]="sectionError('kpi')"
        [updatedAt]="viewState.lastUpdatedAt"
      ></app-kpi-card>
    </section>

    <app-analytics-chart
      [analytics]="analytics"
      [loading]="viewState.analyticsState === 'loading'"
      [errorMessage]="sectionError('analytics')"
    ></app-analytics-chart>

    <app-recent-activity
      [activities]="activity"
      [loading]="viewState.activityState === 'loading'"
      [errorMessage]="sectionError('activity')"
    ></app-recent-activity>
  </section>
</section>
