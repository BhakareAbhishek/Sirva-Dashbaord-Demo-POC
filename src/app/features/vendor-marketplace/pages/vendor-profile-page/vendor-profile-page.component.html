<section class="dashboard-shell">
  <aside class="sidebar">
    <h1 class="brand">sirva</h1>
    <nav aria-label="Main dashboard navigation">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a class="nav-item" routerLink="/vendor-marketplace" routerLinkActive="active">Vendor Marketplace</a>
      <a class="nav-item" href="javascript:void(0)">Widget Library</a>
      <a class="nav-item" href="javascript:void(0)">Publishing Workflow</a>
      <a class="nav-item" href="javascript:void(0)">Landing Pages</a>
      <a class="nav-item" href="javascript:void(0)">Rules Engine</a>
      <a class="nav-item" href="javascript:void(0)">Analytics</a>
      <a class="nav-item" href="javascript:void(0)">Governance</a>
    </nav>

    <div class="profile-card">
      <div class="avatar">AD</div>
      <div class="profile-meta">
        <div class="name">Admin User</div>
        <div class="role">Platform Administrator</div>
      </div>
    </div>
  </aside>

  <div class="vendor-profile-page">
    <!-- Back Navigation -->
    <div class="back-navigation">
      <button class="btn-back" (click)="onBackToList()" aria-label="Back to vendor list">
        <span class="icon">←</span>
        <span class="button-text">Back to Vendor List</span>
      </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-state" role="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span>Loading vendor profile...</span>
    </div>

    <!-- Error State -->
    <div *ngIf="!isLoading && errorMessage" class="error-state" role="alert" aria-live="assertive">
      <div class="error-message">
        <span class="error-icon">⚠</span>
        <div class="error-content">
          <strong>Failed to Load Vendor Profile</strong>
          <p>{{ errorMessage }}</p>
        </div>
      </div>
      <button class="btn-retry" (click)="onRetry()">
        Retry
      </button>
    </div>

    <!-- Vendor Profile -->
    <app-vendor-profile
      *ngIf="!isLoading && vendor"
      [vendor]="vendor"
      [statusHistory]="statusHistory"
      [isLoadingHistory]="isLoadingHistory"
      [canEdit]="true"
      (editVendor)="onEdit()"
      (statusChange)="onStatusChange($event)">
    </app-vendor-profile>
  </div>
</section>
